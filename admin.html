<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端午祝福 - 后台数据</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 24px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { color: #ffd700; font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid #ffd700; padding-bottom: 10px; }
        .stat { font-size: 36px; font-weight: bold; color: #ffd700; text-align: center; }
        .stat-label { text-align: center; color: #666; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #ffd700; color: #333; font-weight: bold; }
        tr:hover { background: #f9f9f9; }
        .loading { text-align: center; color: #999; padding: 40px; }
        .error { text-align: center; color: #ff4444; padding: 20px; }
        .btn { display: block; width: 100%; padding: 12px; background: #ffd700; color: #333; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn:hover { background: #ffed4a; }
        .message-item { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #4ecdc4; }
        .message-text { font-size: 15px; color: #333; }
        .message-time { font-size: 12px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐲 端午祝福后台数据</h1>
        
        <div class="card">
            <h2>📊 访客统计</h2>
            <div class="stat" id="visitorCount">--</div>
            <div class="stat-label">总访问次数</div>
        </div>

        <div class="card">
            <h2>📝 问卷回答 (<span id="answerCount">0</span> 条)</h2>
            <div id="answersList">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="card">
            <h2>💬 留言板 (<span id="messageCount">0</span> 条)</h2>
            <div id="messagesList">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <button class="btn" onclick="loadData()">🔄 刷新数据</button>
    </div>

    <script>
        const GIST_ID = 'ae39a1c3a6cffbaa2612adcba8dd4570';
        const TOKEN = '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';

        async function loadData() {
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });

                if (!response.ok) throw new Error('加载失败');

                const gist = await response.json();
                const data = JSON.parse(gist.files['data.json'].content);

                // 访客数
                document.getElementById('visitorCount').textContent = data.visitors || 0;

                // 问卷回答
                const answers = data.answers || [];
                document.getElementById('answerCount').textContent = answers.length;
                
                if (answers.length === 0) {
                    document.getElementById('answersList').innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无数据</div>';
                } else {
                    let html = '<table><tr><th>时间</th><th>粽子</th><th>假期</th><th>礼物</th></tr>';
                    answers.reverse().forEach(a => {
                        const time = a.timestamp ? new Date(a.timestamp).toLocaleString('zh-CN') : '未知';
                        html += `<tr>
                            <td>${time}</td>
                            <td>${a.zongzi || '-'}${a.zongziDetail ? '(' + a.zongziDetail + ')' : ''}</td>
                            <td>${a.trip || '-'}${a.tripDays ? ' ' + a.tripDays : ''}${a.tripStart ? ' ' + a.tripStart : ''}</td>
                            <td>${a.gift || '-'}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('answersList').innerHTML = html;
                }

                // 留言
                const messages = data.messages || [];
                document.getElementById('messageCount').textContent = messages.length;
                
                if (messages.length === 0) {
                    document.getElementById('messagesList').innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无留言</div>';
                } else {
                    let html = '';
                    messages.reverse().forEach(m => {
                        const time = m.timestamp ? new Date(m.timestamp).toLocaleString('zh-CN') : '未知';
                        html += `<div class="message-item">
                            <div class="message-text">${escapeHtml(m.text || m.message || '')}</div>
                            <div class="message-time">${time}</div>
                        </div>`;
                    });
                    document.getElementById('messagesList').innerHTML = html;
                }

            } catch (error) {
                console.error(error);
                document.getElementById('answersList').innerHTML = '<div class="error">加载失败，请刷新重试</div>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载时获取数据
        loadData();
    </script>
</body>
</html>
